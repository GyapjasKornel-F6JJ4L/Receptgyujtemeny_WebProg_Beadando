<!DOCTYPE html>

<body>

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

            <p class="text-center mt-4 mb-0">Nincs még fiókod? <a href="#" style="color: #0c8f31; font-weight: bold; text-decoration: none;">Regisztrálj itt!</a></p>
