<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teszt - Főoldal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg container mt-3">
            <a class="navbar-brand fw-bold" href="#" style="color: #2c3e50; font-size: 1.5rem;">🍳 ReceptMester</a>
            
            <div class="d-flex align-items-center ms-auto">
                <span class="me-3 fw-bold" style="color: #2c3e50;">Szia, TesztElek!</span>
                <button class="btn btn-primary me-2">+ Új recept</button>
                <button class="btn btn-outline-danger">Kijelentkezés</button>
            </div>
        </nav>
        
        <div class="search-nav d-flex justify-content-between">
            <span class="fw-bold text-muted">Keresés a receptek között...</span>
            <input type="text" class="form-control w-50 m-0 py-1" placeholder="Például: leves, csirke...">
        </div>
    </header>

    <div class="container mt-5">
        <h3 class="mb-4 fw-bold" style="color: #2c3e50;">Legfrissebb receptek</h3>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" class="card-img-top" alt="Étel">
                    <div class="card-body d-flex flex-column">
                        <span class="badge bg-warning text-dark mb-2" style="width: fit-content;">Főétel</span>
                        <h5 class="card-title">Zöldséges Quinoa Tál</h5>
                        <p class="card-text text-muted">Egészséges és gyors ebéd, tele friss zöldségekkel és fehérjével.</p>
                        <button class="btn btn-primary mt-auto w-100">Megnézem</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://images.unsplash.com/photo-1565958011703-44f9829ba187?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" class="card-img-top" alt="Étel">
                    <div class="card-body d-flex flex-column">
                        <span class="badge bg-danger mb-2" style="width: fit-content;">Desszert</span>
                        <h5 class="card-title">Málnás Sajttorta</h5>
                        <p class="card-text text-muted">Könnyed nyári desszert, ami sütés nélkül is fantasztikus.</p>
                        <button class="btn btn-primary mt-auto w-100">Megnézem</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
