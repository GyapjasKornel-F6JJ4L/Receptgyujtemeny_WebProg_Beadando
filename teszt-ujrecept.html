<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teszt - Új Recept</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg container mt-3">
        <a class="navbar-brand fw-bold" href="#" style="color: #2c3e50;">⬅ Vissza a főoldalra</a>
    </nav>

    <div class="container mt-4">
        <div class="app-card mx-auto" style="max-width: 700px;">
            <h2 class="mb-4 fw-bold text-center" style="color: #2c3e50;">✍️ Új Recept Felvitele</h2>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Recept neve</label>
                <input type="text" class="form-control" placeholder="Pl.: Nagyi húslevese">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Kategória</label>
                <select class="form-control" style="appearance: auto;">
                    <option>Előétel</option>
                    <option>Főétel</option>
                    <option>Desszert</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold">Elkészítés leírása</label>
                <textarea class="form-control" rows="6" placeholder="Kezdd azzal, hogy megpucolod a hagymát..."></textarea>
            </div>
            
            <button class="btn btn-primary w-100 text-uppercase" style="letter-spacing: 1px;">Mentés az adatbázisba</button>
        </div>
    </div>

</body>
</html>
